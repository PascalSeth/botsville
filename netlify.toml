# Prevent caching issues by disabling build cache for _next
# This ensures fresh builds every time
[build]
  command = "npx prisma generate && npm run build"
  # Do NOT set publish - the @netlify/plugin-nextjs handles this automatically

# Disable build cache to prevent stale chunk issues
[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

# Next.js on Netlify requires the Next.js runtime
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache static assets
[[headers]]
  for = "/_next/static/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/**"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Disable HTML caching to prevent stale content
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
